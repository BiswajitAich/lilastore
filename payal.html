<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>payal</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="utils.css">
    <link rel="stylesheet" href="responsive.css">
</head>

<body>
    <header>
        <tr>
            <th>
                <div style="padding: 20px; text-align: center; color:#FFB6C1">
                    <h2><b><u>FANCY</u> <u>RINGS</u></b><br></h2>
                    <h6>catelog</h6>
                </div>
            </th>
        <tr>
    </header>
    <main>

        <div class="p_container">
            <div class="img-slider_container" id="img-slider_container">
                <div class="sliding-image" id="sliding-image">
                    <a href="payal/payal1.jpg" target="_main"> <img id="image1" src="payal/payal1.jpg" alt="Image 1">
                    </a>
                    <a href="payal/payal1.1.jpg" target="_main"> <img id="image2" src="payal/payal1.1.jpg"
                            alt="Image 2"> </a>
                </div>
                <div class="sliding-image_btn">
                    <button id="sliding-btn1" onclick="gotoImage('image1','sliding-btn1')"></button>
                    <button id="sliding-btn2" onclick="gotoImage('image2','sliding-btn2')"></button>
                </div>
                <div class="lines">
                    <p>
                        <price>Rs 60</price>
                        <code>(p1)</code>
                    </p>
                </div>
            </div>
            <div class="img-slider_container" id="img-slider_container">
                <div class="sliding-image" id="sliding-image">
                    <a href="payal/payal2.jpg" target="_main"> <img id="image3" src="payal/payal2.jpg" alt="Image 1">
                    </a>
                    <a href="payal/payal2.2.jpg" target="_main"> <img id="image4" src="payal/payal2.2.jpg"
                            alt="Image 2"> </a>
                </div>
                <div class="sliding-image_btn">
                    <button id="sliding-btn3" onclick="gotoImage('image3','sliding-btn3')"></button>
                    <button id="sliding-btn4" onclick="gotoImage('image4','sliding-btn4')"></button>
                </div>
                <div class="lines">
                    <p>
                        <price>Rs 80</price>
                        <code>(p2)</code>
                    </p>
                </div>
            </div>
            <div class="img-slider_container" id="img-slider_container">
                <div class="sliding-image" id="sliding-image">
                    <a href="payal/payal3.jpg" target="_main"> <img id="image5" src="payal/payal3.jpg" alt="Image 1">
                    </a>
                    <a href="payal/payal3.3.jpg" target="_main"> <img id="image6" src="payal/payal3.3.jpg"
                            alt="Image 2"> </a>
                </div>
                <div class="sliding-image_btn">
                    <button id="sliding-btn5" onclick="gotoImage('image5','sliding-btn5')"></button>
                    <button id="sliding-btn6" onclick="gotoImage('image6','sliding-btn6')"></button>
                </div>
                <div class="lines">
                    <p>
                        <price>Rs 50</price>
                        <code>(p3)</code>
                    </p>
                </div>
            </div>
            <div class="img-slider_container" id="img-slider_container">
                <div class="sliding-image" id="sliding-image">
                    <a href="payal/payal4.jpg" target="_main"> <img id="image7" src="payal/payal4.jpg" alt="Image 1">
                    </a>
                    <a href="payal/payal4.4.jpg" target="_main"> <img id="image8" src="payal/payal4.4.jpg"
                            alt="Image 2"> </a>
                </div>
                <div class="sliding-image_btn">
                    <button id="sliding-btn7" onclick="gotoImage('image7','sliding-btn7')"></button>
                    <button id="sliding-btn8" onclick="gotoImage('image8','sliding-btn8')"></button>
                </div>
                <div class="lines">
                    <p>
                        <price>Rs 50</price>
                        <code>(p4)</code>
                    </p>
                </div>
            </div>
            <div class="img-slider_container" id="img-slider_container">
                <div class="sliding-image" id="sliding-image">
                    <a href="payal/payal5.jpg" target="_main"> <img id="image9" src="payal/payal5.jpg" alt="Image 1">
                    </a>
                    <a href="payal/payal5.5.jpg" target="_main"> <img id="image10" src="payal/payal5.5.jpg"
                            alt="Image 2"> </a>
                </div>
                <div class="sliding-image_btn">
                    <button id="sliding-btn9" onclick="gotoImage('image9','sliding-btn9')"></button>
                    <button id="sliding-btn10" onclick="gotoImage('image10','sliding-btn10')"></button>
                </div>
                <div class="lines">
                    <p>
                        <price>Rs 50</price>
                        <code>(p5)</code>
                    </p>
                </div>
            </div>
            <div class="img-slider_container" id="img-slider_container">
                <div class="sliding-image" id="sliding-image">
                    <a href="payal/payal6.jpg" target="_main"> <img id="image11" src="payal/payal6.jpg" alt="Image 1">
                    </a>
                    <a href="payal/payal6.6.jpg" target="_main"> <img id="image12" src="payal/payal6.6.jpg"
                            alt="Image 2"> </a>
                </div>
                <div class="sliding-image_btn">
                    <button id="sliding-btn11" onclick="gotoImage('image11','sliding-btn11')"></button>
                    <button id="sliding-btn12" onclick="gotoImage('image12','sliding-btn12')"></button>
                </div>
                <div class="lines">
                    <p>
                        <price>Rs 120</price>
                        <code>(p6)</code>
                    </p>
                </div>
            </div>
        </div>


        <script>
            function gotoImage(imageId, buttonId) {
                let container = document.getElementById(buttonId).closest('.img-slider_container');

                let images = container.querySelectorAll('.sliding-image img');
                images.forEach(function (image) {
                    image.style.display = 'none';
                });

                let selectedImage = container.querySelector('#' + imageId);
                if (selectedImage) {
                    selectedImage.style.display = 'block';
                }

                let buttons = container.querySelectorAll('.sliding-image_btn button');
                buttons.forEach(function (button) {
                    button.style.border = 'none';
                    button.style.background = 'white';
                });

                let selectedButton = document.getElementById(buttonId);
                if (selectedButton) {
                    selectedButton.style.background = 'lime';
                }
            }

            document.addEventListener('DOMContentLoaded', function () {
                gotoImage('image1', 'sliding-btn1');
                gotoImage('image3', 'sliding-btn3');
                gotoImage('image5', 'sliding-btn5');
                gotoImage('image7', 'sliding-btn7');
                gotoImage('image9', 'sliding-btn9');
                gotoImage('image11', 'sliding-btn11');

            });
        </script>
    </main>

</body>

</html>
